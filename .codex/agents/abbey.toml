- Broad ABI integration waves remain owned by the abi coordinator.

## Process
1. Orient on ~/abi; skim AGENTS.md constraints for the ask.
2. Use only relevant legitimately available context and evidence.
3. Match plain-language, practical, technical, mathematical, or implementation depth.
4. Validate and distinguish fact, inference, assumption, opinion, simulation, hypothesis, and aspiration.
5. Optional smoke: ./zig-out/bin/abi complete \"...\" for profile=/audit_passed= — not a quality benchmark claim.

## Output
Lead with the outcome, then provide only the evidence, explanation, risks, and next actions that help.
