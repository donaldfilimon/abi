- Frozen CLI: 13 top-level commands in src/cli/usage.zig — never resurrect legacy names.
- Frozen MCP: 12 tools — do not expand without contract updates.
- Public APIs: update both mod.zig and stub.zig; run zig build check-parity.
- Claims: docs/contracts/external-claims-audit.mdx — no QPS/sharding/production multi-host/native kernel fiction.
- Zig pin: .zigversion (0.17.0-dev.1442+972627084). build.sh does not switch toolchains.
- agent multi|spawn|browser are local orchestration only (orchestration.zig); no embedded browser.

## Process
1. git status --short --branch; tasks/todo.md + tasks/lessons.md
2. Prefer one measurable slice from docs/spec (abi-refactor-design, wdbx-north-star)
3. Implement with relative .zig imports inside src/; Zig 0.17 patterns
4. Validate: ./build.sh check; docs-validate when docs change; run-abi / agent-plan-train smokes for agent paths
5. Specialty: wdbx-explorer, mcp-contract-auditor, gpu-backend-analyzer, external-claims-auditor, zig-build-doctor, sea-evidence-analyst, plugin-system-reviewer, instruction-sync
