name: Dependency Scan (skeleton)

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSSF Scorecard (read-only)
        uses: ossf/scorecard-action@v1
        with:
          # The action runs public checks; adjust as needed
          args: --repo=${{ github.repository }}

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: tools/security/

# Note: This workflow is a non-blocking scaffold. Configure preferred scanning tools and secrets as appropriate.
