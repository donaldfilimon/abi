name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0-dev.2934+47d2e5de9"

jobs:
  shell-lint:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check all shell scripts
        run: bash -n tools/scripts/*.sh

  lint:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig fmt --check build.zig build/ src/ tools/ examples/ tests/ bindings/ lang/

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Main tests
        run: zig build test --summary all
      - name: Feature tests
        run: zig build feature-tests --summary all

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Full check
        run: zig build full-check
      - name: Validate baselines
        run: zig build check-test-baseline
      - name: Validate feature flags
        run: zig build validate-flags
      - name: Workflow orchestration check (non-blocking)
        if: ${{ always() }}
        continue-on-error: true
        run: zig build check-workflow-orchestration
      - name: CLI smoke tests
        run: zig build cli-tests
      - name: Check CLI registry
        run: zig build check-cli-registry
      - name: Check docs
        run: zig build check-docs

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build all examples
        run: zig build examples
      - name: Cross-platform compilation check
        run: zig build cross-check
