name: CI

# Primary gate + cross-compilation smoke for the ABI framework.
# Runs on macOS (the project's primary platform — Apple frameworks available for
# the native build) and cross-compiles the CLI for the supported non-native
# targets. Keep the pinned Zig version below in sync with .zigversion
# (tools/check_zigversion.sh runs inside `zig build check`).

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.17.0-dev.1398+cb5635714

jobs:
  check:
    name: check (build + tests + lint + parity)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: zig build check
        run: zig build check

  cross-smoke:
    name: cross-compile smoke (linux/windows/macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: zig build cross-smoke
        run: zig build cross-smoke

  # Docs gate omitted from ./build.sh check — see .agents/skills/docs-validate/validate.sh
  docs-validate:
    name: docs (mint validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Mintlify docs validate
        run: .agents/skills/docs-validate/validate.sh
