name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Native Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.304+9787df942
      - run: ./build.sh check

  cross-compile:
    name: Cross Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux
          - aarch64-linux
          - x86_64-macos
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.304+9787df942
      - run: zig build cli -Dtarget=${{ matrix.target }}
      - run: zig build mcp -Dtarget=${{ matrix.target }}
