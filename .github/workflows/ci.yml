name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.16.0-dev.1503+738d2be9d"

jobs:
  lint:
    name: Format Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build lint

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Main tests
        run: zig build test --summary all
      - name: Feature tests
        run: zig build feature-tests --summary all

  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Full check
        run: zig build full-check
      - name: Validate baselines
        run: zig build check-test-baseline
      - name: Validate feature flags
        run: zig build validate-flags
      - name: Workflow orchestration check (non-blocking)
        if: ${{ always() }}
        continue-on-error: true
        run: zig build check-workflow-orchestration
      - name: CLI smoke tests
        run: zig build cli-tests

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Build all examples
        run: zig build examples
