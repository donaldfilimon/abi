site_name: ABI Framework
site_description: Zig 0.17-dev framework for AI services, semantic vector storage, GPU acceleration, and distributed runtime.
site_url: https://donaldfilimon.github.io/abi/
repo_url: https://github.com/donaldfilimon/abi
repo_name: donaldfilimon/abi
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
  features:
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search

exclude_docs: |
  README.md
  skills/**
  submodules/**

nav:
  - Home: index.md
  - Architecture:
      - ABI Refactor Design: spec/abi-refactor-design.md


