site_name: ABI Framework
site_description: Zig 0.17-dev framework for AI services, semantic vector storage, GPU acceleration, and distributed runtime.
site_url: https://donaldfilimon.github.io/abi/
repo_url: https://github.com/donaldfilimon/abi
repo_name: donaldfilimon/abi
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
  features:
    - navigation.sections
    - navigation.indexes
    - toc.follow
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search

exclude_docs: |
  README.md
  skills/**
  submodules/**

nav:
  - Home: index.md
  - Onboarding: onboarding.md
  - Architecture:
      - Abbey Spec: spec/ABBEY-SPEC.md
      - Abbey Aviva ABI Framework: spec/abbey-aviva-abi-framework.md
      - WDBX Technical Analysis: spec/wdbx-technical-analysis.md
  - Reviews:
      - Comprehensive Review 2026-03-24: review/2026-03-24-comprehensive-review.md
  - Archived Plans:
      - Codebase Improvement 2026-03-24: superpowers/plans/2026-03-24-full-codebase-improvement.md
      - ABI MCP Hybrid Integration 2026-04-14: superpowers/plans/2026-04-14-abi-mcp-hybrid-integration.md
      - Inference Connector Integration 2026-04-16: superpowers/plans/2026-04-16-inference-connector-integration.md
      - MCP Registry Migration 2026-04-19: superpowers/plans/2026-04-19-mcp-registry-migration-plan.md
      - Streaming Server Decoupling 2026-04-19: superpowers/plans/2026-04-19-streaming-server-decoupling-plan.md
      - System Refactor 2026-04-19: superpowers/plans/2026-04-19-system-refactor-plan.md
      - Inference Connector Integration 2026-04-27: superpowers/plans/2026-04-27-inference-connector-integration.md
      - Codebase Cleanup 2026-04-28: superpowers/plans/2026-04-28-codebase-cleanup.md
      - Codebase Stability 2026-04-28: superpowers/plans/2026-04-28-codebase-stability.md
      - Zig 0.17 Perfection 2026-04-28: superpowers/plans/2026-04-28-zig-017-perfection.md
  - Archived Specs:
      - Codebase Improvement Design 2026-03-24: superpowers/specs/2026-03-24-full-codebase-improvement-design.md
      - Abbey Dynamic Model Design 2026-03-26: superpowers/specs/2026-03-26-abbey-dynamic-model-design.md
      - Remaining Improvements 2026-03-27: superpowers/specs/2026-03-27-codebase-improvement-remaining.md
      - ABI MCP Hybrid Design 2026-04-14: superpowers/specs/2026-04-14-abi-mcp-hybrid-design.md
      - Streaming Server Decoupling Design 2026-04-19: superpowers/specs/2026-04-19-streaming-server-decoupling-design.md
      - Codebase Improvements Design 2026-04-28: superpowers/specs/2026-04-28-codebase-improvements-design.md
      - Production Hardening Design 2026-04-28: superpowers/specs/2026-04-28-production-hardening-design.md
