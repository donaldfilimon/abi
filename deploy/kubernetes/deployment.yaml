apiVersion: apps/v1
kind: Deployment
metadata:
  name: wdbx-ai
  namespace: wdbx
  labels:
    app: wdbx-ai
    version: v2.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wdbx-ai
  template:
    metadata:
      labels:
        app: wdbx-ai
        version: v2.0.0
    spec:
      serviceAccountName: wdbx-ai
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: wdbx-ai
        image: wdbx-ai:v2.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: WDBX_DATABASE_PATH
          value: "/data/wdbx.db"
        - name: WDBX_LOG_LEVEL
          value: "info"
        - name: WDBX_SERVER_HOST
          value: "0.0.0.0"
        - name: WDBX_SERVER_PORT
          value: "8080"
        - name: WDBX_PERFORMANCE_THREAD_COUNT
          value: "0"
        - name: WDBX_PERFORMANCE_USE_SIMD
          value: "true"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /config
          readOnly: true
        - name: logs
          mountPath: /logs
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: wdbx-ai-data
      - name: config
        configMap:
          name: wdbx-ai-config
      - name: logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - wdbx-ai
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: wdbx-ai
  namespace: wdbx
  labels:
    app: wdbx-ai
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: wdbx-ai
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wdbx-ai
  namespace: wdbx
  labels:
    app: wdbx-ai
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wdbx-ai-data
  namespace: wdbx
  labels:
    app: wdbx-ai
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wdbx-ai-config
  namespace: wdbx
  labels:
    app: wdbx-ai
data:
  config.toml: |
    [database]
    path = "/data/wdbx.db"
    cache_size = 1073741824
    enable_compression = true
    
    [server]
    host = "0.0.0.0"
    port = 8080
    max_connections = 1000
    
    [performance]
    thread_count = 0
    use_simd = true
    batch_size = 1000
    
    [logging]
    level = "info"
    file = "/logs/wdbx.log"
    
    [monitoring]
    enable_metrics = true
    metrics_interval = 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wdbx-ai
  namespace: wdbx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wdbx-ai
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wdbx-ai
  namespace: wdbx
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  tls:
  - hosts:
    - api.wdbx.ai
    secretName: wdbx-ai-tls
  rules:
  - host: api.wdbx.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wdbx-ai
            port:
              name: http